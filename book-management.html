<!DOCTYPE html>
<html>
<head>
    <title>Library Book Management</title>
</head>
<body>

<h1>Library Book Management (Promises)</h1>

<button onclick="showLibrary()">View Books</button>
<button onclick="insertBook()">Add Book</button>
<button onclick="editBook()">Update Book</button>
<button onclick="removeBook()">Delete Book</button>

<pre id="result"></pre>

<script>

const result = document.getElementById("result");

let libraryBooks = [
    {
        bookId: 101,
        bookTitle: "The Great Gatsby",
        writer: "F. Scott Fitzgerald"
    },
    {
        bookId: 102,
        bookTitle: "Wings of Fire",
        writer: "A.P.J. Abdul Kalam"
    },
    {
        bookId: 103,
        bookTitle: "Think and Grow Rich",
        writer: "Napoleon Hill"
    }
];

// GET
function showLibrary() {

    Promise.resolve(libraryBooks)
        .then(data => {
            result.textContent =
                "Available Books:\n\n" +
                JSON.stringify(data, null, 2);
        })
        .catch(err => {
            result.textContent = err;
        });
}

// POST
function insertBook() {

    let newEntry = {
        bookId: libraryBooks.length + 101,
        bookTitle: "Atomic Habits",
        writer: "James Clear"
    };

    Promise.resolve(newEntry)
        .then(book => {
            libraryBooks.push(book);

            result.textContent =
                "Book Added Successfully\n\n" +
                JSON.stringify(book, null, 2);
        })
        .catch(err => {
            result.textContent = err;
        });
}

// PUT
function editBook() {

    Promise.resolve()
        .then(() => {

            libraryBooks[0].bookTitle = "The Great Gatsby - Revised Edition";

            result.textContent =
                "Book Updated Successfully\n\n" +
                JSON.stringify(libraryBooks[0], null, 2);
        })
        .catch(err => {
            result.textContent = err;
        });
}

// DELETE
function removeBook() {

    Promise.resolve()
        .then(() => {

            let removedBook = libraryBooks.pop();

            result.textContent =
                "Book Removed Successfully\n\n" +
                JSON.stringify(removedBook, null, 2);
        })
        .catch(err => {
            result.textContent = err;
        });
}

</script>

</body>
</html>
